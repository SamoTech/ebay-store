<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <defs>
    <linearGradient id="bgEB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#001a10"/>
    </linearGradient>
    <filter id="glowEB">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="360" fill="url(#bgEB)"/>
  <!-- Grid overlay -->
  <g opacity="0.04" stroke="#86efac" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="150" y1="0" x2="150" y2="360"/>
    <line x1="300" y1="0" x2="300" y2="360"/>
  </g>
  <!-- Shopping bag icon -->
  <g transform="translate(60, 90)" filter="url(#glowEB)">
    <!-- Bag shape -->
    <path d="M30 50 L20 150 L150 150 L140 50 Z" fill="none" stroke="#86efac" stroke-width="2"/>
    <!-- Bag handle -->
    <path d="M55 50 C55 20 115 20 115 50" fill="none" stroke="#86efac" stroke-width="2"/>
    <!-- eBay-style price tag -->
    <rect x="35" y="80" width="100" height="50" rx="6" fill="#001a10" stroke="#86efac" stroke-width="1"/>
    <text x="85" y="100" font-family="monospace" font-size="9" fill="#86efac" text-anchor="middle" font-weight="bold">BEST DEAL</text>
    <text x="85" y="118" font-family="monospace" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">$49.99</text>
    <!-- AI badge -->
    <rect x="35" y="135" width="45" height="12" rx="6" fill="#86efac" opacity="0.2"/>
    <text x="57" y="145" font-family="monospace" font-size="8" fill="#86efac" text-anchor="middle">AI-Powered</text>
    <rect x="83" y="135" width="52" height="12" rx="6" fill="#5b9bd5" opacity="0.2"/>
    <text x="109" y="145" font-family="monospace" font-size="8" fill="#5b9bd5" text-anchor="middle">Live Prices</text>
  </g>
  <!-- Title -->
  <text x="280" y="148" font-family="'Segoe UI', Arial, sans-serif" font-size="54" font-weight="800" fill="#ffffff" letter-spacing="-1">Deals</text>
  <text x="280" y="212" font-family="'Segoe UI', Arial, sans-serif" font-size="54" font-weight="800" fill="#86efac" letter-spacing="-1">Hub</text>
  <!-- Tagline -->
  <text x="282" y="254" font-family="'Segoe UI', Arial, sans-serif" font-size="21" fill="#8b949e">AI-powered eBay deals finder — live prices, smart search, affiliate tracking</text>
  <!-- Badges -->
  <g transform="translate(282, 282)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="#86efac" opacity="0.15"/>
    <text x="50" y="19" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#86efac" text-anchor="middle" font-weight="600">Next.js 16</text>
    <rect x="112" y="0" width="90" height="28" rx="14" fill="#5b9bd5" opacity="0.15"/>
    <text x="157" y="19" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#5b9bd5" text-anchor="middle" font-weight="600">React 19</text>
    <rect x="214" y="0" width="120" height="28" rx="14" fill="#ffd166" opacity="0.15"/>
    <text x="274" y="19" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#ffd166" text-anchor="middle" font-weight="600">TypeScript 5</text>
    <rect x="346" y="0" width="110" height="28" rx="14" fill="#888" opacity="0.15"/>
    <text x="401" y="19" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#aaa" text-anchor="middle" font-weight="600">MIT License</text>
  </g>
  <text x="1150" y="340" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#86efac" opacity="0.6" text-anchor="end" font-weight="600">SamoTech</text>
</svg>